<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory Glitch</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg1: #06060e;
    --bg2: #0d0e1f;
    --panel: rgba(14,14,26,0.92);
    --text: #e8e8f0;
    --muted: rgba(232,232,240,0.5);
    --accent: #7c5cff;
    --accent2: #c084fc;
    --good: #34d399;
    --bad: #f87171;
    --border: rgba(124,92,255,0.2);
    --scanline: rgba(255,255,255,0.015);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg1);
    overflow: hidden;
}

.blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
}
.blob1 {
    width: 500px; height: 500px;
    background: rgba(124,92,255,0.18);
    top: -120px; left: -120px;
    animation: blobFloat1 9s ease-in-out infinite alternate;
}
.blob2 {
    width: 420px; height: 420px;
    background: rgba(192,132,252,0.1);
    bottom: -100px; right: -100px;
    animation: blobFloat2 12s ease-in-out infinite alternate;
}
.blob3 {
    width: 300px; height: 300px;
    background: rgba(52,211,153,0.07);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: blobFloat3 7s ease-in-out infinite alternate;
}
@keyframes blobFloat1 { to { transform: translate(50px, 40px); } }
@keyframes blobFloat2 { to { transform: translate(-40px, -30px); } }
@keyframes blobFloat3 { to { transform: translate(-40px, 20px); } }

#game {
    width: 560px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 26px 28px;
    text-align: center;
    position: relative;
    z-index: 1;
    background-image: repeating-linear-gradient(
        to bottom,
        var(--scanline) 0px, var(--scanline) 1px,
        transparent 1px, transparent 4px
    );
    background-color: var(--panel);
}

#game::before, #game::after,
#game .corner-br, #game .corner-bl {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.5;
}
#game::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
#game::after  { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
#game .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
#game .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 6px 0 2px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 4px;
    margin-bottom: 14px;
}

#hud {
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 12px;
}
#hud span { display: flex; flex-direction: column; align-items: center; gap: 2px; }
#hud .val { font-size: 1.05rem; color: var(--text); font-family: 'Orbitron', sans-serif; }

#status {
    font-size: 0.82rem;
    color: var(--muted);
    min-height: 18px;
    margin-bottom: 4px;
}

#task {
    font-size: 1.1rem;
    color: var(--accent2);
    min-height: 26px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

#countdown-wrap {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    margin-bottom: 12px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.2s;
}
#countdown-bar {
    height: 100%;
    width: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform-origin: left;
    transition: transform linear;
}

#grid {
    display: grid;
    gap: 8px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.04);
    min-height: 120px;
    margin-bottom: 14px;
}

.btn {
    padding: 0;
    aspect-ratio: 1;
    border-radius: 9px;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    font-weight: 700;
    font-size: 1rem;
    font-family: 'Orbitron', sans-serif;
    transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
    background: rgba(30,30,48,0.95);
    color: var(--text);
    position: relative;
    overflow: hidden;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.1s;
}

.btn:hover:not(:disabled) {
    transform: scale(1.07);
    box-shadow: 0 0 14px rgba(124,92,255,0.45);
    border-color: rgba(124,92,255,0.4);
}

.btn:disabled { cursor: default; }

.btn.hidden-tile {
    background: rgba(20,20,36,0.95);
    color: transparent;
}

.btn.hidden-tile:hover:not(:disabled) {
    box-shadow: 0 0 14px rgba(124,92,255,0.4);
    border-color: rgba(124,92,255,0.35);
}

.btn.good {
    background: rgba(52,211,153,0.2) !important;
    border-color: var(--good) !important;
    color: var(--good) !important;
    box-shadow: 0 0 16px rgba(52,211,153,0.3);
}
.btn.bad {
    background: rgba(248,113,113,0.2) !important;
    border-color: var(--bad) !important;
    color: var(--bad) !important;
    box-shadow: 0 0 16px rgba(248,113,113,0.3);
}

@keyframes pulse-good {
    0%   { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
}
.btn.good { animation: pulse-good 0.5s ease-out; }

#start {
    padding: 11px 28px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent2);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 2px;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 18px rgba(124,92,255,0.2);
}
#start:hover {
    background: rgba(124,92,255,0.15);
    box-shadow: 0 0 24px rgba(124,92,255,0.4);
}
#start:disabled { opacity: 0.4; cursor: default; }

#levelup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(124,92,255,0.95);
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    padding: 12px 28px;
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 10;
    white-space: nowrap;
}
#levelup.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: rgba(232,232,240,0.5);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.18s;
    z-index: 100;
}
.back-link:hover {
    color: rgba(232,232,240,1);
}
</style>
</head>
<body>

<a href="scratch.html" class="back-link">← Back to Inside My Mind</a>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div id="game">
    <div class="corner-br"></div>
    <div class="corner-bl"></div>

    <div id="levelup">LEVEL UP</div>

    <h1>MEMORY GLITCH</h1>
    <div class="subtitle">NEURAL SEQUENCE TRAINER</div>

    <div id="hud">
        <span><span class="val" id="val-streak">0</span>STREAK</span>
        <span><span class="val" id="val-best">0</span>BEST</span>
        <span><span class="val" id="val-level">1</span>LEVEL</span>
    </div>

    <div id="status">Initialise sequence to begin.</div>
    <div id="task">—</div>

    <div id="countdown-wrap"><div id="countdown-bar"></div></div>

    <div id="grid"></div>

    <button id="start" onclick="startGame()">INITIALISE</button>
</div>

<script>
let gridData   = [];
let target     = null;
let phase      = "idle";
let streak     = 0;
let best       = 0;
let level      = 1;
let gridSize   = 3;
let showTime   = 1500;
let timerId    = null;

const gridEl      = document.getElementById("grid");
const taskEl      = document.getElementById("task");
const statusEl    = document.getElementById("status");
const startBtn    = document.getElementById("start");
const valStreak   = document.getElementById("val-streak");
const valBest     = document.getElementById("val-best");
const valLevel    = document.getElementById("val-level");
const countWrap   = document.getElementById("countdown-wrap");
const countBar    = document.getElementById("countdown-bar");
const levelupEl   = document.getElementById("levelup");

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function updateHUD() {
    valStreak.textContent = streak;
    valBest.textContent   = best;
    valLevel.textContent  = level;
}

function buildGrid(hidden) {
    gridEl.innerHTML = "";
    gridEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    gridData.forEach((val) => {
        const btn = document.createElement("button");
        btn.className = hidden ? "btn hidden-tile" : "btn";
        btn.textContent = hidden ? "" : val;
        btn.disabled = !hidden;

        if (hidden) {
            btn.addEventListener("click", () => handleClick(val, btn), { once: true });
        }
        gridEl.appendChild(btn);
    });
}

function startCountdown(duration) {
    countWrap.style.opacity = "1";
    countBar.style.transition = "none";
    countBar.style.transform  = "scaleX(1)";
    countBar.getBoundingClientRect();
    countBar.style.transition = `transform ${duration}ms linear`;
    countBar.style.transform  = "scaleX(0)";
}

function stopCountdown() {
    countWrap.style.opacity = "0";
    countBar.style.transition = "none";
    countBar.style.transform  = "scaleX(1)";
}

function showLevelUp() {
    levelupEl.textContent = `LEVEL ${level}`;
    levelupEl.classList.add("show");
    setTimeout(() => levelupEl.classList.remove("show"), 900);
}

function startRound() {
    const total = gridSize * gridSize;
    gridData = shuffle(Array.from({ length: total }, (_, i) => i + 1));
    target   = gridData[Math.floor(Math.random() * total)];
    phase    = "show";

    taskEl.textContent    = `Memorise tile: ${target}`;
    statusEl.textContent  = "Study the grid…";

    buildGrid(false);
    startCountdown(showTime);

    timerId = setTimeout(hideGrid, showTime);
}

function hideGrid() {
    timerId = null;
    phase   = "hide";
    stopCountdown();

    taskEl.textContent   = `Where was ${target}?`;
    statusEl.textContent = "Select the correct tile.";

    buildGrid(true);
}

function handleClick(value, btn) {
    if (phase !== "hide") return;

    phase = "idle";

    gridEl.querySelectorAll(".btn").forEach(b => b.disabled = true);

    if (value === target) {
        btn.classList.add("good");
        btn.textContent = value;
        streak++;
        best = Math.max(best, streak);

        const levelled = (streak % 3 === 0) && gridSize < 5;
        if (levelled) {
            gridSize++;
            level++;
            showTime = Math.max(600, showTime - 200);
        }

        updateHUD();
        statusEl.textContent = "Sequence verified ✔";

        if (levelled) showLevelUp();

        timerId = setTimeout(startRound, levelled ? 1100 : 850);

    } else {
        btn.classList.add("bad");
        btn.textContent = value;
        statusEl.textContent = "Memory collapse ✖";

        gridEl.querySelectorAll(".btn").forEach((b, i) => {
            if (gridData[i] === target) {
                b.classList.add("good");
                b.textContent = target;
            }
        });

        timerId = setTimeout(resetGame, 1400);
    }
}

function resetGame() {
    if (timerId) { clearTimeout(timerId); timerId = null; }

    streak   = 0;
    level    = 1;
    gridSize = 3;
    showTime = 1500;
    phase    = "idle";

    updateHUD();
    stopCountdown();
    gridEl.innerHTML     = "";
    taskEl.textContent   = "—";
    statusEl.textContent = "Simulation terminated. Restart?";

    startBtn.disabled        = false;
    startBtn.style.display   = "inline-block";
    startBtn.textContent     = "REINITIALISE";
}

function startGame() {
    startBtn.disabled      = true;
    startBtn.style.display = "none";

    if (timerId) { clearTimeout(timerId); timerId = null; }

    streak   = 0;
    level    = 1;
    gridSize = 3;
    showTime = 1500;

    updateHUD();
    startRound();
}
</script>
</body>
</html>
